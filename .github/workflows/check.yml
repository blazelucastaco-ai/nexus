name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test
        env:
          # Tests open a real SQLite DB at ~/.nexus/memory.db; make sure CI
          # has a writable home.
          HOME: ${{ github.workspace }}/.home
