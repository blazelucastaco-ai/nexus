name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test (main package)
        run: pnpm test
        env:
          # Tests open a real SQLite DB at ~/.nexus/memory.db; make sure CI
          # has a writable home.
          HOME: ${{ github.workspace }}/.home

      # Hub package — install deps (reusing the monorepo store), typecheck,
      # and run the full integration suite against a fresh in-memory SQLite.
      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile
        working-directory: hub

      - name: Typecheck (hub)
        run: npx tsc --noEmit
        working-directory: hub

      - name: Test (hub)
        run: pnpm test
        working-directory: hub
