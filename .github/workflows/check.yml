name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Prepare test HOME
        # Create a HOME directory OUTSIDE the checked-out repo. If HOME is
        # inside the workspace (e.g. `$workspace/.home`), the daemon's self-
        # protection guard refuses writes under it because it's inside the
        # NEXUS source tree — which breaks tests that intentionally write
        # to `~/...`. Using RUNNER_TEMP puts HOME on a separate path.
        run: |
          mkdir -p "${RUNNER_TEMP}/nexus-home/.nexus"
          echo "TEST_HOME=${RUNNER_TEMP}/nexus-home" >> "$GITHUB_ENV"

      - name: Test (main package)
        run: pnpm test
        env:
          HOME: ${{ env.TEST_HOME }}

      # Hub package — install deps (reusing the monorepo store), typecheck,
      # and run the full integration suite against a fresh in-memory SQLite.
      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile
        working-directory: hub

      - name: Typecheck (hub)
        run: npx tsc --noEmit
        working-directory: hub

      - name: Test (hub)
        run: pnpm test
        working-directory: hub
