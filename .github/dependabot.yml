# Dependabot automates weekly dependency updates for the three npm surfaces
# NEXUS ships (daemon + hub + installer-app) plus GitHub Actions itself.
# Security updates come in automatically; regular updates batch weekly.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, daemon]

  - package-ecosystem: npm
    directory: /hub
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, hub]

  - package-ecosystem: npm
    directory: /installer-app
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # Electron major bumps need human review — don't auto-group them.
    ignore:
      - dependency-name: electron
        update-types: [version-update:semver-major]
      - dependency-name: electron-builder
        update-types: [version-update:semver-major]
    labels: [dependencies, installer-app]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    labels: [dependencies, ci]
